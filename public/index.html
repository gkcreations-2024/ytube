<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube Video Downloader</title>
  <link rel="stylesheet" href="./style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

</head>
<body>
  <div class="container">
    <h1>YouTube Video Downloader</h1>
    
    <div class="form-container">
      <form method="POST" action="/download" id="videoForm">
        <input type="text" name="videoURL" id="videoURL" placeholder="Enter YouTube URL" required>
        <button type="submit" id="submitButton">Download</button>
      </form>
    </div>

    <!-- Thumbnail and Options -->
    <div id="videoDetails" class="hidden">
      <div id="thumbnailContainer">
        <img id="videoThumbnail" src="" alt="Video Thumbnail">
        <div id="videoInfo">
          <h3 id="videoTitle"></h3>
          <p id="videoDuration"></p>
          <div>
            <label for="formatSelect">Choose Format: </label>
            <select id="formatSelect">
              <option value="mp4">MP4</option>
              <option value="mp3">MP3</option>
            </select>
          </div>
          <button id="downloadButton">Start Download</button>
        </div>
      </div>
      
      <!-- Downloading Circle -->
      <div id="downloadingCircle" class="hidden">
        <div class="circle"></div>
        <p id="downloadPercentage">0%</p>
      </div>

      <!-- Success Message -->
      <div id="successMessage" class="hidden">
        <h2>Download Successful!</h2>
        <div id="celebrationEffect"></div>
      </div>
    </div>
  </div>

  <script src="./script.js"></script>
</body>
</html>
